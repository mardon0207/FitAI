<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FitAI — Dizayn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: 'Inter', system-ui, sans-serif; color: #0F172A; }
  * { box-sizing: border-box; }
  input, button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens-ds.jsx"></script>
<script type="text/babel" src="screens-a.jsx"></script>
<script type="text/babel" src="screens-b.jsx"></script>
<script type="text/babel" src="screens-c.jsx"></script>

<script type="text/babel">
const DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "uz",
  "theme": "light",
  "primaryColor": "#0EA5E9",
  "accentColor": "#F59E0B"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...DEFAULTS, ...(JSON.parse(localStorage.getItem('fitai-tweaks')||'{}')) }; }
    catch { return { ...DEFAULTS }; }
  });
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => {
    localStorage.setItem('fitai-tweaks', JSON.stringify(tweaks));
    // apply primary colour variables
    window.FIT.primary = tweaks.primaryColor;
    window.FIT.accent = tweaks.accentColor;
  }, [tweaks]);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const dark = tweaks.theme === 'dark';

  // Screens grouped by prompt number (16 prompts)
  const groups = [
    { id: 'ds', title: '00 · Design System', subtitle: 'Tokens, colors, type, components', screens: [
      { id: 'ds-main', label: 'Full system', w: 1040, h: 1600, render: () => <DesignSystemBoard t={I18N[tweaks.lang]} dark={dark}/> },
    ]},
    { id: 'onboard', title: '01 · Splash + Onboarding', subtitle: '4 screens · first-run flow', screens: [
      { id: 'splash', label: 'Splash', render: () => <ScreenSplash dark={dark}/> },
      { id: 'ob1', label: '1 · Food database', render: () => <ScreenOnboard1 dark={dark}/> },
      { id: 'ob2', label: '2 · Ingredient composer', render: () => <ScreenOnboard2 dark={dark}/> },
      { id: 'ob3', label: '3 · Vitamins tracking', render: () => <ScreenOnboard3 dark={dark}/> },
    ]},
    { id: 'auth', title: '02 · Authentication', subtitle: 'Login · Register · Forgot', screens: [
      { id: 'login', label: 'Login', render: () => <ScreenLogin dark={dark}/> },
      { id: 'register', label: 'Register', render: () => <ScreenRegister dark={dark}/> },
      { id: 'forgot', label: 'Forgot password', render: () => <ScreenForgot dark={dark}/> },
    ]},
    { id: 'quiz', title: '03 · Profile Quiz', subtitle: '6-step onboarding questionnaire', screens: [
      { id: 'q1', label: '1 · Goal', render: () => <ScreenQuiz1 dark={dark}/> },
      { id: 'q2', label: '2 · Height/weight', render: () => <ScreenQuiz2 dark={dark}/> },
      { id: 'q3', label: '3 · Age/gender', render: () => <ScreenQuiz3 dark={dark}/> },
      { id: 'q4', label: '4 · Activity', render: () => <ScreenQuiz4 dark={dark}/> },
      { id: 'q5', label: '5 · Diet tags', render: () => <ScreenQuiz5 dark={dark}/> },
      { id: 'q6', label: '6 · Ready!', render: () => <ScreenQuiz6 dark={dark}/> },
    ]},
    { id: 'home', title: '04 · Home Dashboard', subtitle: 'Main screen · calorie ring + meals', screens: [
      { id: 'home-main', label: 'Home', h: 812, render: () => <ScreenHome dark={dark}/> },
    ]},
    { id: 'search', title: '05 · Food Search ⭐', subtitle: 'Primary input method', screens: [
      { id: 'search-main', label: 'Search', h: 812, render: () => <ScreenSearch dark={dark}/> },
    ]},
    { id: 'composer', title: "06 · Ingredient Composer ⭐⭐", subtitle: "Core new feature — build meal from ingredients", screens: [
      { id: 'composer-main', label: 'Composer', h: 812, render: () => <ScreenComposer dark={dark}/> },
    ]},
    { id: 'input', title: '07 · Barcode + Manual Entry', subtitle: 'Secondary input methods', screens: [
      { id: 'barcode', label: 'Barcode scanner', h: 720, render: () => <ScreenBarcode dark={dark}/> },
      { id: 'manual', label: 'Manual entry', h: 812, render: () => <ScreenManual dark={dark}/> },
    ]},
    { id: 'diary', title: '08 · Meal Diary', subtitle: 'All meals logged for a day', screens: [
      { id: 'diary-main', label: 'Diary', h: 812, render: () => <ScreenDiary dark={dark}/> },
    ]},
    { id: 'detail', title: '09 · Food Detail', subtitle: 'Portion + nutrition breakdown', screens: [
      { id: 'detail-main', label: 'Food detail', h: 812, render: () => <ScreenFoodDetail dark={dark}/> },
    ]},
    { id: 'stats', title: '10 · Stats / Progress', subtitle: 'Charts & trends', screens: [
      { id: 'stats-main', label: 'Stats', h: 812, render: () => <ScreenStats dark={dark}/> },
    ]},
    { id: 'micro', title: '11 · Micronutrients + Deficiency', subtitle: 'Vitamins & warnings', screens: [
      { id: 'micro-main', label: 'Micronutrients', h: 812, render: () => <ScreenMicro dark={dark}/> },
      { id: 'deficiency', label: 'Deficiency warning', h: 812, render: () => <ScreenDeficiency dark={dark}/> },
    ]},
    { id: 'profile', title: '12 · Profile & Settings', subtitle: 'User info, goals, settings', screens: [
      { id: 'profile-main', label: 'Profile', h: 812, render: () => <ScreenProfile dark={dark}/> },
    ]},
    { id: 'quick', title: '13 · Water / Weight / FAB', subtitle: 'Delightful micro-interactions', screens: [
      { id: 'water', label: 'Water tracker', render: () => <ScreenWater dark={dark}/> },
      { id: 'weight', label: 'Weight log', render: () => <ScreenWeight dark={dark}/> },
      { id: 'fab', label: 'FAB menu', h: 812, render: () => <ScreenFabMenu dark={dark}/> },
    ]},
    { id: 'achieve', title: '14 · Achievements & Streaks', subtitle: 'Gamification layer', screens: [
      { id: 'achieve-main', label: 'Achievements', h: 812, render: () => <ScreenAchieve dark={dark}/> },
    ]},
    { id: 'report', title: '15 · Weekly Report', subtitle: 'PDF-ready summary', screens: [
      { id: 'report-main', label: 'Weekly report', h: 812, render: () => <ScreenReport dark={dark}/> },
    ]},
    { id: 'micro-s', title: '16 · Language / Theme / Permissions', subtitle: 'Micro-screens', screens: [
      { id: 'lang', label: 'Language picker', render: () => <ScreenLang dark={dark}/> },
      { id: 'theme', label: 'Theme picker', render: () => <ScreenTheme dark={dark}/> },
      { id: 'perms', label: 'Permissions', render: () => <ScreenPerms dark={dark}/> },
    ]},
  ];

  return (
    <>
      <DesignCanvas title="FitAI — Mobile App Dizayn" subtitle="16 prompts · O'zbek nutrition tracker">
        {groups.map(g => (
          <DCSection key={g.id} id={g.id} title={g.title} subtitle={g.subtitle}>
            {g.screens.map(s => (
              <DCArtboard key={s.id} id={s.id} label={s.label} width={s.w || 375} height={s.h || 720}>
                <div key={tweaks.lang + tweaks.theme + tweaks.primaryColor} style={{ width: s.w||375, height: s.h||720 }}>
                  {s.render()}
                </div>
              </DCArtboard>
            ))}
          </DCSection>
        ))}
      </DesignCanvas>

      {tweaksOpen && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
          width: 280, background: '#fff', borderRadius: 16,
          boxShadow: '0 12px 48px rgba(0,0,0,0.18)', padding: 18,
          fontFamily: 'Inter, sans-serif', border: '1px solid #E5E7EB',
        }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>Tweaks</div>
            <div onClick={() => setTweaksOpen(false)} style={{ cursor: 'pointer', color: '#64748B', fontSize: 18 }}>×</div>
          </div>

          <div style={{ fontSize: 11, fontWeight: 600, color: '#64748B', textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 6 }}>Til</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {['uz','ru','en'].map(l => (
              <div key={l} onClick={() => setTweak('lang', l)} style={{
                flex: 1, padding: '8px 0', textAlign: 'center', borderRadius: 8,
                background: tweaks.lang===l ? '#10B981' : '#F5F5F4',
                color: tweaks.lang===l ? '#fff' : '#0F172A',
                fontSize: 12, fontWeight: 600, cursor: 'pointer', textTransform: 'uppercase',
              }}>{l}</div>
            ))}
          </div>

          <div style={{ fontSize: 11, fontWeight: 600, color: '#64748B', textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 6 }}>Tema</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {[{k:'light',n:'☀️ Light'},{k:'dark',n:'🌙 Dark'}].map(th => (
              <div key={th.k} onClick={() => setTweak('theme', th.k)} style={{
                flex: 1, padding: '8px 0', textAlign: 'center', borderRadius: 8,
                background: tweaks.theme===th.k ? '#10B981' : '#F5F5F4',
                color: tweaks.theme===th.k ? '#fff' : '#0F172A',
                fontSize: 12, fontWeight: 600, cursor: 'pointer',
              }}>{th.n}</div>
            ))}
          </div>

          <div style={{ fontSize: 11, fontWeight: 600, color: '#64748B', textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 6 }}>Primary rang</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 14 }}>
            {['#10B981','#0EA5E9','#8B5CF6','#F59E0B','#EC4899'].map(c => (
              <div key={c} onClick={() => setTweak('primaryColor', c)} style={{
                width: 36, height: 36, borderRadius: 10, background: c, cursor: 'pointer',
                border: tweaks.primaryColor===c ? '3px solid #0F172A' : '3px solid transparent',
              }}/>
            ))}
          </div>

          <div style={{ fontSize: 11, color: '#64748B', lineHeight: 1.5 }}>
            Barcha 16 ekran, har ekran uchun til/tema o'zgaradi. Ekranni fullscreen qilish uchun ustiga bosing.
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
